version: 2

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - main: .
    binary: liste
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/pufferhaus/liste/cmd.buildVersion={{.Version}}
      - -X github.com/pufferhaus/liste/cmd.buildCommit={{.ShortCommit}}
      - -X github.com/pufferhaus/liste/cmd.buildDate={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

brews:
  - name: liste
    repository:
      owner: pufferhaus
      name: liste
      token: "{{ .Env.GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/pufferhaus/liste"
    description: "Portable CLI roadmap tracker for humans and AI agents"
    license: "MIT"
    test: |
      system "#{bin}/liste", "version"
    install: |
      bin.install "liste"

scoops:
  - repository:
      owner: pufferhaus
      name: liste
      token: "{{ .Env.GITHUB_TOKEN }}"
    directory: bucket
    homepage: "https://github.com/pufferhaus/liste"
    description: "Portable CLI roadmap tracker for humans and AI agents"
    license: "MIT"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

release:
  github:
    owner: pufferhaus
    name: liste
