version: 2

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - main: .
    binary: liste
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

brews:
  - name: liste
    repository:
      owner: pufferhaus
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/pufferhaus/liste"
    description: "Tasks in markdown — a CLI for humans and AI agents"
    license: "MIT"
    test: |
      system "#{bin}/liste", "version"
    install: |
      bin.install "liste"
    caveats: |
      Install Claude Code skills for AI agents:
        liste skills install

      Then add to ~/.claude/CLAUDE.md:
        At the start of every session, invoke the liste:session-start skill.

      Docs: https://github.com/pufferhaus/liste

scoops:
  - repository:
      owner: pufferhaus
      name: liste
      token: "{{ .Env.GITHUB_TOKEN }}"
    directory: bucket
    homepage: "https://github.com/pufferhaus/liste"
    description: "Tasks in markdown — a CLI for humans and AI agents"
    license: "MIT"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

release:
  github:
    owner: pufferhaus
    name: liste
